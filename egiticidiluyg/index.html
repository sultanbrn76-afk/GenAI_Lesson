<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dil Serüveni - Çocuklar İçin İngilizce</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f4ff;
            user-select: none;
        }

        /* Özel Animasyonlar */
        @keyframes bounceIn {
            0% { transform: scale(0.9); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        .animate-pop {
            animation: bounceIn 0.5s ease-out;
        }

        .level-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .level-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        /* Yanlış Cevap Sallanma */
        .shake {
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <header class="bg-white border-b-2 border-indigo-100 sticky top-0 z-50">
        <div class="container mx-auto px-4 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <!-- Her yerde görünen Geri Butonu -->
                <button id="globalBackBtn" onclick="game.showMenu()" class="p-3 bg-indigo-50 text-indigo-600 rounded-2xl hover:bg-indigo-100 transition-all flex items-center gap-2 font-bold group">
                    <i data-lucide="chevron-left" class="group-hover:-translate-x-1 transition-transform"></i>
                    <span>MENÜ</span>
                </button>
                
                <div class="flex items-center gap-2 ml-2">
                    <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-indigo-200">E</div>
                    <h1 class="font-black text-slate-800 tracking-tight hidden xs:block text-xl">ENGLISH GO</h1>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-amber-50 px-5 py-2 rounded-2xl border-2 border-amber-200">
                    <i data-lucide="star" class="w-5 h-5 text-amber-500 fill-amber-500"></i>
                    <span id="scoreDisplay" class="font-black text-amber-700">0</span>
                </div>
            </div>
        </div>
    </header>

    <main id="gameContainer" class="flex-grow container mx-auto px-4 py-8 max-w-4xl">
        <!-- JavaScript burayı dinamik olarak dolduracak -->
    </main>

    <footer class="py-6 text-center text-slate-400 font-bold text-sm">
        ✨ Dil Serüveni v1.0 - Her Gün Yeni Bir Kelime! ✨
    </footer>

    <script>
        // Veri Seti
        const DATA = {
            A1: {
                name: "Starter (A1)",
                color: "bg-emerald-500",
                icon: "baby",
                questions: [
                    { q: "Hangisi 'Güneş' demektir?", options: ["Sun", "Moon", "Cloud"], correct: "Sun", tip: "Sarı ve sıcak." },
                    { q: "I ____ a student.", options: ["is", "am", "are"], correct: "am", tip: "Ben bir öğrenciyim." },
                    { q: "Hangisi bir hayvandır?", options: ["Table", "Apple", "Lion"], correct: "Lion", tip: "Ormanlar kralı." }
                ]
            },
            A2: {
                name: "Elementary (A2)",
                color: "bg-sky-500",
                icon: "footprints",
                questions: [
                    { q: "Where do you buy bread?", options: ["Bakery", "Library", "Cinema"], correct: "Bakery", tip: "Fırın neresidir?" },
                    { q: "She ____ to music every day.", options: ["listen", "listening", "listens"], correct: "listens", tip: "Geniş zaman takısı." }
                ]
            },
            B1: {
                name: "Intermediate (B1)",
                color: "bg-indigo-500",
                icon: "bicycle",
                questions: [
                    { q: "Anxious kelimesinin anlamı nedir?", options: ["Mutlu", "Endişeli", "Hızlı"], correct: "Endişeli", tip: "Bir duygu durumu." },
                    { q: "I have ____ my homework.", options: ["finish", "finished", "finishing"], correct: "finished", tip: "Yakın geçmiş zaman (V3)." }
                ]
            },
            B2: {
                name: "Upper (B2)",
                color: "bg-orange-500",
                icon: "rocket",
                questions: [
                    { q: "Synonym of 'Significant'?", options: ["Huge", "Important", "Small"], correct: "Important", tip: "Önemli anlamına gelir." },
                    { q: "If I ____ rich, I would travel.", options: ["am", "was", "were"], correct: "were", tip: "Hayali durum (Conditionals)." }
                ]
            },
            C2: {
                name: "Mastery (C2)",
                color: "bg-rose-600",
                icon: "crown",
                questions: [
                    { q: "'Once in a blue moon' ne demektir?", options: ["Her gün", "Çok nadir", "Asla"], correct: "Çok nadir", tip: "Bir deyim." },
                    { q: "The findings were ____ to the theory.", options: ["pivotal", "small", "vague"], correct: "pivotal", tip: "Hayati derecede önemli." }
                ]
            }
        };

        const game = {
            score: 0,
            currentLevel: null,
            questionIndex: 0,

            init() {
                this.showMenu();
                lucide.createIcons();
            },

            showMenu() {
                this.currentLevel = null;
                document.getElementById('globalBackBtn').classList.add('invisible');
                const container = document.getElementById('gameContainer');
                
                let html = `
                    <div class="animate-pop">
                        <div class="text-center mb-10">
                            <h2 class="text-3xl font-black text-slate-800 mb-2">Hoş Geldin Kaşif! 🚀</h2>
                            <p class="text-slate-500 font-bold text-lg">Bir seviye seç ve maceraya başla.</p>
                        </div>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                `;

                for (let key in DATA) {
                    const level = DATA[key];
                    html += `
                        <div onclick="game.startLevel('${key}')" class="level-card ${level.color} p-8 rounded-[2.5rem] text-white cursor-pointer relative overflow-hidden group shadow-lg">
                            <div class="relative z-10">
                                <span class="bg-white/20 px-3 py-1 rounded-full text-xs font-black uppercase tracking-widest">${key}</span>
                                <h3 class="text-3xl font-black mt-2">${level.name}</h3>
                                <div class="mt-8 flex items-center gap-2 font-black text-sm group-hover:gap-4 transition-all">
                                    BAŞLA <i data-lucide="arrow-right" class="w-5 h-5"></i>
                                </div>
                            </div>
                            <i data-lucide="${level.icon}" class="absolute -right-6 -bottom-6 w-32 h-32 opacity-20 group-hover:rotate-12 transition-transform"></i>
                        </div>
                    `;
                }

                html += `</div></div>`;
                container.innerHTML = html;
                lucide.createIcons();
            },

            startLevel(key) {
                this.currentLevel = key;
                this.questionIndex = 0;
                document.getElementById('globalBackBtn').classList.remove('invisible');
                this.renderQuestion();
            },

            renderQuestion() {
                const levelData = DATA[this.currentLevel];
                const q = levelData.questions[this.questionIndex];
                const container = document.getElementById('gameContainer');
                const progress = ((this.questionIndex + 1) / levelData.questions.length) * 100;

                container.innerHTML = `
                    <div class="max-w-2xl mx-auto animate-pop">
                        <div class="bg-white rounded-[3rem] shadow-2xl p-10 border-b-[12px] border-slate-100 relative" id="questionCard">
                            
                            <div class="flex justify-between items-center mb-8">
                                <span class="bg-indigo-50 text-indigo-600 px-4 py-1.5 rounded-full font-black text-sm uppercase">
                                    ${this.currentLevel} • Soru ${this.questionIndex + 1}/${levelData.questions.length}
                                </span>
                                <div class="w-32 bg-slate-100 h-2.5 rounded-full overflow-hidden">
                                    <div class="h-full bg-indigo-500 transition-all duration-500" style="width: ${progress}%"></div>
                                </div>
                            </div>

                            <h2 class="text-3xl font-black text-slate-800 text-center mb-4 leading-tight">${q.q}</h2>
                            <p class="text-center text-slate-400 font-bold italic mb-10">"${q.tip}"</p>

                            <div class="grid gap-4">
                                ${q.options.map(opt => `
                                    <button onclick="game.checkAnswer('${opt}')" class="option-btn w-full p-5 text-left border-4 border-slate-50 rounded-2xl font-bold text-slate-700 hover:border-indigo-400 hover:bg-indigo-50 transition-all flex justify-between items-center group">
                                        <span class="text-lg">${opt}</span>
                                        <i data-lucide="chevron-right" class="w-5 h-5 text-indigo-200 group-hover:text-indigo-500 transition-colors"></i>
                                    </button>
                                `).join('')}
                            </div>

                            <div id="feedback" class="mt-8 hidden p-5 rounded-2xl font-black flex items-center gap-3"></div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            },

            checkAnswer(choice) {
                const q = DATA[this.currentLevel].questions[this.questionIndex];
                const card = document.getElementById('questionCard');
                const feedback = document.getElementById('feedback');
                const btns = document.querySelectorAll('.option-btn');

                btns.forEach(btn => btn.disabled = true);

                if (choice === q.correct) {
                    this.score += 10;
                    document.getElementById('scoreDisplay').innerText = this.score;
                    
                    feedback.className = "mt-8 p-5 rounded-2xl font-black flex items-center gap-3 bg-green-100 text-green-700 animate-pop";
                    feedback.innerHTML = `<i data-lucide="party-popper"></i> HARİKA! DOĞRU CEVAP!`;
                    feedback.classList.remove('hidden');
                    
                    setTimeout(() => {
                        this.questionIndex++;
                        if (this.questionIndex < DATA[this.currentLevel].questions.length) {
                            this.renderQuestion();
                        } else {
                            this.showResult();
                        }
                    }, 1500);
                } else {
                    card.classList.add('shake');
                    feedback.className = "mt-8 p-5 rounded-2xl font-black flex items-center gap-3 bg-red-100 text-red-700 animate-pop";
                    feedback.innerHTML = `<i data-lucide="info"></i> TEKRAR DENE, YAPABİLİRSİN!`;
                    feedback.classList.remove('hidden');
                    
                    setTimeout(() => {
                        card.classList.remove('shake');
                        feedback.classList.add('hidden');
                        btns.forEach(btn => btn.disabled = false);
                    }, 1000);
                }
                lucide.createIcons();
            },

            showResult() {
                const container = document.getElementById('gameContainer');
                container.innerHTML = `
                    <div class="max-w-md mx-auto text-center animate-pop">
                        <div class="bg-white p-12 rounded-[4rem] shadow-2xl border-b-[16px] border-amber-400">
                            <div class="w-24 h-24 bg-amber-100 text-amber-500 rounded-full flex items-center justify-center mx-auto mb-8 shadow-inner">
                                <i data-lucide="award" class="w-14 h-14"></i>
                            </div>
                            <h2 class="text-4xl font-black text-slate-800 mb-2">TEBRİKLER!</h2>
                            <p class="text-slate-500 font-bold text-lg mb-10">${DATA[this.currentLevel].name} Tamamlandı!</p>
                            
                            <div class="flex flex-col gap-4">
                                <button onclick="game.showMenu()" class="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black text-xl flex items-center justify-center gap-3 hover:bg-indigo-700 shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                                    <i data-lucide="home"></i> ANA MENÜYE DÖN
                                </button>
                                <button onclick="game.startLevel('${this.currentLevel}')" class="w-full py-5 bg-slate-100 text-slate-600 rounded-[2rem] font-black text-xl flex items-center justify-center gap-3 hover:bg-slate-200 active:scale-95 transition-all">
                                    <i data-lucide="refresh-cw"></i> TEKRAR OYNA
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                lucide.createIcons();
            }
        };

        // Uygulama Yükleme
        window.onload = () => game.init();
    </script>
</body>
</html>
